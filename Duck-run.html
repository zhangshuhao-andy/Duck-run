<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CyberDuck FULL</title>
<style>
body { margin:0; background:#0a0a19; overflow:hidden; }
canvas { display:block; margin:auto; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");
c.width = 1000; c.height = 600;

const GROUND = 520;

// ================= 状态 =================
let page = "menu";
let state = "play";

let speed = 10;
let distance = 0;

// ================= 玩家 =================
let player = {
    x:150,y:GROUND-50,
    vy:0,
    jumpCount:0,
    angle:0,
    squash:1,
    crouch:false,
    ghosts:[]
};

// ================= 数据 =================
let hazards = [];
let platforms = [];

// ================= 控制 =================
c.addEventListener("mousedown", ()=>jump());
c.addEventListener("touchstart", ()=>jump());

document.addEventListener("keydown",e=>{
    if(e.code==="Space") jump();
    if(e.code==="KeyC") player.crouch=true;
});
document.addEventListener("keyup",e=>{
    if(e.code==="KeyC") player.crouch=false;
});

function jump(){
    if(page==="menu"){
        startGame();
        return;
    }
    if(player.jumpCount<2 && !player.crouch){
        player.vy=-17;
        player.jumpCount++;
        player.squash=1.4;
    }
}

// ================= 工具 =================
function rand(a,b){return Math.random()*(b-a)+a;}
function hit(a,b){
    return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ================= 地图生成 =================
function initMap(){
    hazards=[]; platforms=[];
    let x=1200;

    while(x<4000){
        let r=Math.random();

        if(r<0.4){
            hazards.push({x,y:GROUND-45,w:42,h:45,type:"mine"});
            x+=rand(320,480);
        }else if(r<0.7){
            hazards.push({x,y:GROUND-120,w:240,h:35,type:"laser"});
            x+=500;
        }else{
            x+=rand(300,450);
        }

        if(Math.random()>0.3){
            platforms.push({x:x-120,y:GROUND-160,w:220,h:20});
        }
    }
}

// ================= 游戏开始 =================
function startGame(){
    page="game";
    state="play";
    speed=10;
    distance=0;

    player.y=GROUND-50;
    player.vy=0;
    player.jumpCount=0;
    player.angle=0;
    player.ghosts=[];

    initMap();
}

// ================= 玩家更新 =================
function updatePlayer(){
    let target = player.crouch ? 0.35 : 1;
    player.squash += (target-player.squash)*0.25;

    if(!player.crouch){
        player.vy += 0.85;
        player.y += player.vy;

        if(player.jumpCount>0) player.angle-=12;
        else player.angle*=0.8;

    }else{
        player.vy=0;
        player.angle*=0.5;

        if(player.y+50<GROUND) player.y+=12;
    }

    // 拖尾
    player.ghosts.push({
        x:player.x,y:player.y,
        angle:player.angle,
        squash:player.squash,
        crouch:player.crouch
    });
    if(player.ghosts.length>6) player.ghosts.shift();

    // 地面
    if(player.y+50>=GROUND){
        player.y=GROUND-50;
        player.vy=0;
        player.jumpCount=0;
    }

    // 平台
    if(!player.crouch && player.vy>=0){
        let foot = {x:player.x,y:player.y+40,w:45,h:10};

        platforms.forEach(p=>{
            if(hit(foot,p) && player.y+40 < p.y+p.h/2){
                player.y = p.y-50;
                player.vy=0;
                player.jumpCount=0;
            }
        });
    }
}

// ================= 主更新 =================
function update(){
    if(page!=="game" || state!=="play") return;

    updatePlayer();

    hazards.forEach(h=>h.x-=speed);
    platforms.forEach(p=>p.x-=speed);

    speed+=0.002;
    distance+=speed;

    // 碰撞
    let ph = player.crouch?20:45;
    let py = player.y+(player.crouch?30:5);

    hazards.forEach(h=>{
        if(hit({x:player.x+10,y:py,w:25,h:ph},h)){
            if(!(h.type==="laser" && player.crouch)){
                state="dead";
            }
        }
    });

    // 无限生成
    if(hazards.length && hazards[hazards.length-1].x < 1000){
        let x = hazards[hazards.length-1].x + rand(300,600);
        let r=Math.random();

        if(r<0.6){
            hazards.push({x,y:GROUND-45,w:42,h:45,type:"mine"});
        }else{
            hazards.push({x,y:GROUND-120,w:240,h:35,type:"laser"});
        }

        if(Math.random()>0.5){
            platforms.push({x:x-120,y:GROUND-180,w:220,h:20});
        }
    }
}

// ================= 绘制鸭子 =================
function drawDuck(x,y,angle,squash,alpha,crouch){
    let h = 50*squash;
    let w = 45*(crouch?1.8:2.0-squash);

    ctx.save();
    ctx.translate(x+25,y+25);
    ctx.rotate(angle*Math.PI/180);
    ctx.globalAlpha=alpha;

    ctx.beginPath();
    ctx.ellipse(0,0,w/2,h/2,0,0,Math.PI*2);
    ctx.fillStyle="#ffd432";
    ctx.fill();

    ctx.fillStyle="#00ffff";
    ctx.fillRect(w/4,-h/6,16,crouch?4:8);

    ctx.restore();
}

// ================= 玩家绘制 =================
function drawPlayer(){
    player.ghosts.forEach((g,i)=>{
        drawDuck(g.x,g.y,g.angle,g.squash,0.2+i*0.1,g.crouch);
    });

    drawDuck(player.x,player.y,player.angle,player.squash,1,player.crouch);
}

// ================= UI =================
function button(txt,x,y,cb){
    let hover = mouse.x>x && mouse.x<x+200 && mouse.y>y && mouse.y<y+70;

    ctx.fillStyle = hover ? "#5050aa" : "#303070";
    ctx.fillRect(x,y,200,70);

    ctx.fillStyle="white";
    ctx.font="28px Impact";
    ctx.fillText(txt,x+30,y+45);

    if(hover && mouse.click) cb();
}

// ================= 绘制 =================
function draw(){
    ctx.fillStyle="#0a0a19";
    ctx.fillRect(0,0,1000,600);

    if(page==="menu"){
        ctx.fillStyle="#ffd432";
        ctx.font="90px Impact";
        ctx.fillText("CYBER DUCK",180,200);

        button("START",400,300,startGame);
        return;
    }

    // 地面
    ctx.fillStyle="#141432";
    ctx.fillRect(0,GROUND,1000,100);

    // 平台
    ctx.fillStyle="#00ffff";
    platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

    // 障碍
    hazards.forEach(h=>{
        ctx.fillStyle = h.type==="laser" ? "#ff3296" : "#ffd432";
        ctx.fillRect(h.x,h.y,h.w,h.h);
    });

    drawPlayer();

    ctx.fillStyle="white";
    ctx.font="30px Arial";
    ctx.fillText("DIST "+Math.floor(distance),20,40);

    if(state==="dead"){
        ctx.fillStyle="rgba(0,0,0,0.7)";
        ctx.fillRect(0,0,1000,600);
        ctx.fillStyle="white";
        ctx.font="80px Impact";
        ctx.fillText("WASTED",320,300);
    }
}

// ================= 鼠标 =================
let mouse={x:0,y:0,click:false};
c.addEventListener("mousemove",e=>{
    mouse.x=e.offsetX; mouse.y=e.offsetY;
});
c.addEventListener("mousedown",()=>mouse.click=true);
c.addEventListener("mouseup",()=>mouse.click=false);

// ================= 循环 =================
function loop(){
    update();
    draw();
    mouse.click=false;
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
